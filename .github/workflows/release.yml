name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger so CI changes can be tested without retagging.
  # When fired from the UI, github.ref_name will be the branch name
  # (e.g. "main"), which tauri-action will use as the release tag.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS ARM64 (Apple Silicon — macos-14)
  # ---------------------------------------------------------------------------
  build-macos-arm:
    name: Build macOS ARM64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-macos-arm-${{ hashFiles('backend/requirements.txt', 'backend/constraints.txt', 'backend/requirements-build.txt') }}
          restore-keys: pip-macos-arm-

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: cargo-macos-arm-${{ hashFiles('frontend/src-tauri/Cargo.lock', 'frontend/src-tauri/Cargo.toml', 'frontend/src-tauri/tauri.conf.json') }}
          restore-keys: cargo-macos-arm-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-macos-arm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-macos-arm-

      - name: Install Python deps + PyInstaller
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements.txt
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements-build.txt

      - name: Verify torch
        working-directory: backend
        run: |
          source venv/bin/activate
          python -c "import torch; print('torch=', torch.__version__, 'mps=', torch.backends.mps.is_available())"

      - name: Build backend sidecar
        run: bash frontend/src-tauri/binaries/build.sh

      - name: Strip quarantine + size verify (macOS)
        run: |
          set -euo pipefail
          # Onedir layout: frontend/src-tauri/binaries/sovlens-backend/{sovlens-backend, _internal/...}
          DIR="frontend/src-tauri/binaries/sovlens-backend"
          BIN="$DIR/sovlens-backend"
          if [ ! -d "$DIR" ]; then echo "::error::No sidecar dir at $DIR" && exit 1; fi
          if [ ! -f "$BIN" ]; then echo "::error::No bootloader exe at $BIN" && exit 1; fi
          xattr -dr com.apple.quarantine "$DIR" || true
          # Aggregate-size check — bootloader EXE itself is tiny in onedir;
          # the bulk lives in _internal/.
          SIZE=$(du -sk "$DIR" | awk '{print $1 * 1024}')
          echo "sidecar dir size: $SIZE bytes"
          if [ "$SIZE" -lt 200000000 ]; then echo "::error::sidecar dir <200MB" && exit 1; fi

      - name: Upload PyInstaller warnings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-warn-macos-arm
          path: backend/build/sovlens-backend/warn-*.txt
          if-no-files-found: ignore

      - name: Install Node deps
        working-directory: frontend
        run: npm ci

      - name: Verify signing key reaches runner
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty or unset"
            exit 1
          fi
          echo "Secret length: ${#TAURI_SIGNING_PRIVATE_KEY} chars"
          echo "First 24 chars: ${TAURI_SIGNING_PRIVATE_KEY:0:24}..."
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "SovLens ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          includeUpdaterJson: true
          releaseDraft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # macOS Intel (x86_64 — macos-13)
  # ---------------------------------------------------------------------------
  build-macos-intel:
    name: Build macOS Intel
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-macos-intel-${{ hashFiles('backend/requirements.txt', 'backend/constraints.txt', 'backend/requirements-build.txt') }}
          restore-keys: pip-macos-intel-

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: cargo-macos-intel-${{ hashFiles('frontend/src-tauri/Cargo.lock', 'frontend/src-tauri/Cargo.toml', 'frontend/src-tauri/tauri.conf.json') }}
          restore-keys: cargo-macos-intel-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-macos-intel-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-macos-intel-

      - name: Install Python deps + PyInstaller
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements.txt
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements-build.txt

      - name: Verify torch
        working-directory: backend
        run: |
          source venv/bin/activate
          python -c "import torch; print('torch=', torch.__version__, 'mps=', torch.backends.mps.is_available())"

      - name: Build backend sidecar
        run: bash frontend/src-tauri/binaries/build.sh

      - name: Strip quarantine + size verify (macOS)
        run: |
          set -euo pipefail
          # Onedir layout: frontend/src-tauri/binaries/sovlens-backend/{sovlens-backend, _internal/...}
          DIR="frontend/src-tauri/binaries/sovlens-backend"
          BIN="$DIR/sovlens-backend"
          if [ ! -d "$DIR" ]; then echo "::error::No sidecar dir at $DIR" && exit 1; fi
          if [ ! -f "$BIN" ]; then echo "::error::No bootloader exe at $BIN" && exit 1; fi
          xattr -dr com.apple.quarantine "$DIR" || true
          # Aggregate-size check — bootloader EXE itself is tiny in onedir;
          # the bulk lives in _internal/.
          SIZE=$(du -sk "$DIR" | awk '{print $1 * 1024}')
          echo "sidecar dir size: $SIZE bytes"
          if [ "$SIZE" -lt 200000000 ]; then echo "::error::sidecar dir <200MB" && exit 1; fi

      - name: Upload PyInstaller warnings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-warn-macos-intel
          path: backend/build/sovlens-backend/warn-*.txt
          if-no-files-found: ignore

      - name: Install Node deps
        working-directory: frontend
        run: npm ci

      - name: Verify signing key reaches runner
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty or unset"
            exit 1
          fi
          echo "Secret length: ${#TAURI_SIGNING_PRIVATE_KEY} chars"
          echo "First 24 chars: ${TAURI_SIGNING_PRIVATE_KEY:0:24}..."
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "SovLens ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          includeUpdaterJson: true
          releaseDraft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # Windows x86_64
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Backend is now PyInstaller onedir (many <50 MB files instead of
      # one ~1 GB EXE), which removed the original NSIS mmap failure.
      # We keep the Defender exclusions defensively: torch DLLs in
      # _internal/ still individually trigger AV heuristics, and a
      # quarantined DLL mid-build would still break the NSIS File step.
      - name: Disable Defender for workspace
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"
            Add-MpPreference -ExclusionPath "$env:RUNNER_TEMP"
            Add-MpPreference -ExclusionProcess "pyinstaller.exe"
            Add-MpPreference -ExclusionProcess "makensis.exe"
            Add-MpPreference -ExclusionProcess "sovlens-backend.exe"
            Write-Host "Defender exclusions added."
          } catch {
            Write-Warning "Defender exclusion failed (non-fatal): $_"
          }

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-windows-${{ hashFiles('backend/requirements.txt', 'backend/constraints.txt', 'backend/requirements-build.txt') }}
          restore-keys: pip-windows-

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            frontend\src-tauri\target
          key: cargo-windows-${{ hashFiles('frontend/src-tauri/Cargo.lock', 'frontend/src-tauri/Cargo.toml', 'frontend/src-tauri/tauri.conf.json') }}
          restore-keys: cargo-windows-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: frontend\node_modules
          key: npm-windows-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-windows-

      - name: Create Python venv
        working-directory: backend
        shell: pwsh
        run: python -m venv venv

      # CUDA torch must be installed BEFORE the rest of requirements
      # so pip doesn't pull the CPU-only wheel transitively.
      - name: Install CUDA torch (Windows)
        working-directory: backend
        shell: pwsh
        run: |
          .\venv\Scripts\Activate.ps1
          pip install --retries 5 --timeout 60 torch --index-url https://download.pytorch.org/whl/cu121

      - name: Install remaining Python deps + PyInstaller
        working-directory: backend
        shell: pwsh
        run: |
          .\venv\Scripts\Activate.ps1
          pip install --upgrade pip
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements.txt
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements-build.txt

      # Re-pin the cu121 torch wheel AFTER the main requirements install.
      # pip's resolver will happily downgrade torch to the PyPI CPU wheel
      # when a transitive dep (sentence-transformers / ultralytics / etc.)
      # asks for a plain `torch` without the +cu121 local-version tag.
      # --force-reinstall --no-deps puts the CUDA wheel back without
      # touching anything else. Hard-fail the build if the CPU wheel
      # somehow survived.
      - name: Re-pin CUDA torch + verify
        working-directory: backend
        shell: pwsh
        run: |
          .\venv\Scripts\Activate.ps1
          pip install --retries 5 --timeout 60 --force-reinstall --no-deps torch --index-url https://download.pytorch.org/whl/cu121
          python -c "import torch,sys; assert torch.version.cuda, f'CPU torch wheel leaked into build: {torch.__version__}'; print('torch=', torch.__version__, 'cuda=', torch.version.cuda, 'is_available=', torch.cuda.is_available())"

      - name: Free disk space
        shell: pwsh
        run: |
          Get-PSDrive C | Format-Table -AutoSize
          # Drop unused tool versions
          if (Test-Path "C:\hostedtoolcache\Python") {
            Get-ChildItem "C:\hostedtoolcache\Python" -Directory | Where-Object { $_.Name -notlike "3.11*" } | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }
          Get-PSDrive C | Format-Table -AutoSize

      - name: Build backend sidecar
        shell: cmd
        run: frontend\src-tauri\binaries\build.bat

      - name: Upload PyInstaller warnings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-warn-windows
          path: backend/build/sovlens-backend/warn-*.txt
          if-no-files-found: ignore

      - name: Install Node deps
        working-directory: frontend
        run: npm ci

      - name: Verify signing key reaches runner (win)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY secret is empty or unset"
            exit 1
          }
          Write-Host "Secret length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars"
          Write-Host "First 24 chars: $($env:TAURI_SIGNING_PRIVATE_KEY.Substring(0,24))..."

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "SovLens ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          includeUpdaterJson: true
          releaseDraft: false
          prerelease: false
