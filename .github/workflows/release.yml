name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger so CI changes can be tested without retagging.
  # When fired from the UI, github.ref_name will be the branch name
  # (e.g. "main"), which tauri-action will use as the release tag.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # macOS ARM64 (Apple Silicon — macos-14)
  # ---------------------------------------------------------------------------
  build-macos-arm:
    name: Build macOS ARM64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-macos-arm-${{ hashFiles('backend/requirements.txt', 'backend/constraints.txt', 'backend/requirements-build.txt') }}
          restore-keys: pip-macos-arm-

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: cargo-macos-arm-${{ hashFiles('frontend/src-tauri/Cargo.lock', 'frontend/src-tauri/Cargo.toml', 'frontend/src-tauri/tauri.conf.json') }}
          restore-keys: cargo-macos-arm-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: npm-macos-arm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-macos-arm-

      - name: Install Python deps + PyInstaller
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements.txt
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements-build.txt

      - name: Verify ONNX Runtime
        working-directory: backend
        run: |
          source venv/bin/activate
          python -c "import onnxruntime as ort; print('ort=', ort.__version__, 'providers=', ort.get_available_providers())"

      - name: Download yolov8n.onnx for bundle
        run: |
          set -euo pipefail
          # Bundled into the PyInstaller sidecar so end users don't need
          # network access to run object detection. Source: Ultralytics
          # official GitHub release (HF Hub Xenova/yolov8n started
          # 401-ing in May 2026). ~12 MB.
          mkdir -p backend/models
          curl -fSL --retry 5 --retry-delay 5 \
            -o backend/models/yolov8n.onnx \
            https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8n.onnx
          SIZE=$(stat -f%z backend/models/yolov8n.onnx 2>/dev/null || stat -c%s backend/models/yolov8n.onnx)
          echo "yolov8n.onnx size: $SIZE bytes"
          if [ "$SIZE" -lt 10000000 ]; then
            echo "::error::yolov8n.onnx is too small ($SIZE bytes)"
            exit 1
          fi

      - name: Build backend sidecar
        run: bash frontend/src-tauri/binaries/build.sh

      - name: Verify sidecar tarball (macOS)
        run: |
          set -euo pipefail
          # Sidecar now ships as a single tarball that the Rust shell
          # extracts on first launch (sidesteps Tauri's resource walker
          # choking on PyInstaller symlink farms — see build.sh header).
          TARBALL="frontend/src-tauri/binaries/sovlens-backend.tar.gz"
          if [ ! -f "$TARBALL" ]; then echo "::error::No sidecar tarball at $TARBALL" && exit 1; fi
          xattr -d com.apple.quarantine "$TARBALL" 2>/dev/null || true
          # Compressed tarball size guard. PyInstaller onedir is ~150-250MB
          # raw; gzip lands ~80-130MB compressed. Floor at 80MB so an
          # empty/partial PyInstaller build can't slip through.
          SIZE=$(stat -f%z "$TARBALL" 2>/dev/null || stat -c%s "$TARBALL")
          echo "sidecar tarball size: $SIZE bytes (compressed)"
          if [ "$SIZE" -lt 80000000 ]; then echo "::error::sidecar tarball <80MB compressed" && exit 1; fi

      - name: Upload PyInstaller warnings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-warn-macos-arm
          path: backend/build/sovlens-backend/warn-*.txt
          if-no-files-found: ignore

      - name: Install Node deps
        working-directory: frontend
        run: npm ci

      - name: Verify signing key reaches runner
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty or unset"
            exit 1
          fi
          echo "Secret length: ${#TAURI_SIGNING_PRIVATE_KEY} chars"
          echo "First 24 chars: ${TAURI_SIGNING_PRIVATE_KEY:0:24}..."
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "SovLens ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          includeUpdaterJson: true
          releaseDraft: false
          prerelease: false

  # ---------------------------------------------------------------------------
  # Windows x86_64
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Backend is now PyInstaller onedir (many <50 MB files instead of
      # one ~1 GB EXE), which removed the original NSIS mmap failure.
      # We keep the Defender exclusions defensively: torch DLLs in
      # _internal/ still individually trigger AV heuristics, and a
      # quarantined DLL mid-build would still break the NSIS File step.
      - name: Disable Defender for workspace
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"
            Add-MpPreference -ExclusionPath "$env:RUNNER_TEMP"
            Add-MpPreference -ExclusionProcess "pyinstaller.exe"
            Add-MpPreference -ExclusionProcess "makensis.exe"
            Add-MpPreference -ExclusionProcess "sovlens-backend.exe"
            Write-Host "Defender exclusions added."
          } catch {
            Write-Warning "Defender exclusion failed (non-fatal): $_"
          }

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-windows-${{ hashFiles('backend/requirements.txt', 'backend/constraints.txt', 'backend/requirements-build.txt') }}
          restore-keys: pip-windows-

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            frontend\src-tauri\target
          key: cargo-windows-${{ hashFiles('frontend/src-tauri/Cargo.lock', 'frontend/src-tauri/Cargo.toml', 'frontend/src-tauri/tauri.conf.json') }}
          restore-keys: cargo-windows-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: frontend\node_modules
          key: npm-windows-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-windows-

      - name: Create Python venv
        working-directory: backend
        shell: pwsh
        run: python -m venv venv

      - name: Install Python deps + PyInstaller
        working-directory: backend
        shell: pwsh
        run: |
          .\venv\Scripts\Activate.ps1
          pip install --upgrade pip
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements.txt
          pip install --retries 5 --timeout 60 -c constraints.txt -r requirements-build.txt

      # rapidocr-onnxruntime and scenedetect declare unpinned transitive deps
      # on the plain wheels `onnxruntime` and `opencv-python`. pip installs
      # them ALONGSIDE the explicit `onnxruntime-directml` + `opencv-python-
      # headless<4.11` requested by requirements.txt. The plain wheels share
      # the `onnxruntime` / `cv2` namespaces and the last-installed wins at
      # import — so end-users silently lose DirectML EP (CPU-only, 5-10x
      # slow) and pick up opencv 4.13 which declares numpy>=2 (breaks
      # LanceDB 0.14 per CLAUDE.md gotcha #3). Same class of bug as the
      # CUDA torch wheel issue (gotcha #21). Verified-from-end-user log on
      # the Win dev box: get_available_providers() returned
      # ['AzureExecutionProvider','CPUExecutionProvider'] post-install.
      - name: Re-pin DirectML ORT + headless opencv (kill plain-wheel contamination)
        working-directory: backend
        shell: pwsh
        run: |
          .\venv\Scripts\Activate.ps1
          pip uninstall -y onnxruntime opencv-python
          pip install --force-reinstall --no-deps onnxruntime-directml
          pip install --force-reinstall --no-deps "opencv-python-headless<4.11"

      # ONNX Runtime ships its own CUDA / DirectML EPs as wheels (no CUDA
      # toolkit install needed on the runner). Verify ORT loads cleanly +
      # hard-fail the build if DmlExecutionProvider isn't present. Skipping
      # this assert previously let CPU-only releases ship.
      - name: Verify ONNX Runtime + DirectML EP
        working-directory: backend
        shell: pwsh
        run: |
          .\venv\Scripts\Activate.ps1
          python -c "import onnxruntime as ort; provs = ort.get_available_providers(); print('ort=', ort.__version__, 'providers=', provs); assert 'DmlExecutionProvider' in provs, f'DirectML EP missing — plain ort wheel contaminated the install: {provs}'"

      # cuDNN 9 DLLs are the only external runtime dep for CTranslate2 4.x
      # GPU whisper. Without them, end users see "Extreme falls back to
      # CPU" — same failure mode as gotcha #21 (CUDA torch silently
      # downgrading). Fail the build if the wheel's DLLs aren't where we
      # expect them.
      - name: Verify cuDNN 9 bundle (nvidia-cudnn-cu12)
        working-directory: backend
        shell: pwsh
        run: |
          .\venv\Scripts\Activate.ps1
          # nvidia.cudnn is a PEP-420 namespace pkg — __file__ is None.
          # Use __path__[0] which works for both namespace and regular pkgs.
          python -c @"
          import pathlib, nvidia.cudnn
          d = pathlib.Path(list(nvidia.cudnn.__path__)[0]) / 'bin'
          dlls = sorted(p.name for p in d.glob('cudnn*.dll'))
          print('cudnn bin dir:', d)
          print('cudnn dlls found:', dlls)
          for need in ('cudnn_ops64_9.dll', 'cudnn64_9.dll', 'cudnn_graph64_9.dll'):
              assert (d / need).exists(), f'{need} missing — CT2 GPU will fall back to CPU'
          "@

      - name: Free disk space
        shell: pwsh
        run: |
          Get-PSDrive C | Format-Table -AutoSize
          # Drop unused tool versions
          if (Test-Path "C:\hostedtoolcache\Python") {
            Get-ChildItem "C:\hostedtoolcache\Python" -Directory | Where-Object { $_.Name -notlike "3.11*" } | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }
          Get-PSDrive C | Format-Table -AutoSize

      - name: Download yolov8n.onnx for bundle
        shell: pwsh
        run: |
          # Bundled into the sidecar so end users don't need network for
          # object detection. Source: Ultralytics GH release (HF
          # Xenova/yolov8n began 401-ing in May 2026). ~12 MB.
          New-Item -ItemType Directory -Path backend\models -Force | Out-Null
          $url = 'https://github.com/ultralytics/assets/releases/download/v8.4.0/yolov8n.onnx'
          $dst = 'backend\models\yolov8n.onnx'
          Invoke-WebRequest -Uri $url -OutFile $dst -MaximumRetryCount 5 -RetryIntervalSec 5
          $size = (Get-Item $dst).Length
          Write-Host "yolov8n.onnx size: $size bytes"
          if ($size -lt 10000000) {
            Write-Error "::error::yolov8n.onnx is too small ($size bytes)"
            exit 1
          }

      - name: Build backend sidecar
        shell: cmd
        run: frontend\src-tauri\binaries\build.bat

      - name: Verify sidecar archive (Windows)
        shell: pwsh
        run: |
          $archive = "frontend\src-tauri\binaries\sovlens-backend.tar.gz"
          if (-not (Test-Path $archive)) {
            Write-Error "::error::No sidecar archive at $archive"
            exit 1
          }
          $size = (Get-Item $archive).Length
          Write-Host "sidecar archive size: $size bytes (compressed)"
          if ($size -lt 80000000) {
            Write-Error "::error::sidecar archive <80MB compressed"
            exit 1
          }

      - name: Upload PyInstaller warnings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-warn-windows
          path: backend/build/sovlens-backend/warn-*.txt
          if-no-files-found: ignore

      - name: Install Node deps
        working-directory: frontend
        run: npm ci

      - name: Verify signing key reaches runner (win)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY)) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY secret is empty or unset"
            exit 1
          }
          Write-Host "Secret length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length) chars"
          Write-Host "First 24 chars: $($env:TAURI_SIGNING_PRIVATE_KEY.Substring(0,24))..."

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "SovLens ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          includeUpdaterJson: true
          releaseDraft: false
          prerelease: false
